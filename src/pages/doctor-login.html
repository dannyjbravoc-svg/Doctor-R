<div class="auth-container">
  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Iniciar Sesión</h1>
        <p>Accede a tu dashboard médico</p>
      </div>
      
      <form id="doctor-login-form" class="auth-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" required>
          <div class="error-message" id="email-error"></div>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required>
          <div class="error-message" id="password-error"></div>
        </div>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="remember">
            <span class="checkmark"></span>
            Recordar mi sesión
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
      </form>
      
      <div class="auth-footer">
        <p>¿Eres paciente? <a href="/paciente/login" data-link>Ingresa aquí</a></p>
        <p><a href="/doctor/monedero" data-link>¿Olvidaste tu contraseña?</a></p>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const loginForm = document.getElementById('doctor-login-form');
  
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    
    // Validar campos
    let isValid = true;
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');
    
    emailError.textContent = '';
    passwordError.textContent = '';
    
    if (!email) {
      emailError.textContent = 'El correo es obligatorio';
      isValid = false;
    } else if (!/^\S+@\S+\.\S+$/.test(email)) {
      emailError.textContent = 'Formato de correo inválido';
      isValid = false;
    }
    
    if (!password) {
      passwordError.textContent = 'La contraseña es obligatoria';
      isValid = false;
    } else if (password.length < 6) {
      passwordError.textContent = 'La contraseña debe tener al menos 6 caracteres';
      isValid = false;
    }
    
    if (!isValid) return;
    
    // Intentar login
    const result = login(email, password, remember);
    
    if (result.success) {
      showToast('Inicio de sesión exitoso', 'success');
      // Redirigir al dashboard después de un breve retraso
      setTimeout(() => {
        navigate('/doctor/dashboard');
      }, 1000);
    } else {
      showToast(result.error, 'error');
    }
  });
});
</script>
