<div class="auth-container">
  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Recuperar Contraseña</h1>
        <p>Recupera el acceso a tu cuenta</p>
      </div>
      
      <form id="recovery-form" class="auth-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" required>
          <div class="error-message" id="email-error"></div>
        </div>
        
        <p>Ingresa tu correo electrónico para recibir instrucciones de recuperación de contraseña.</p>
        
        <button type="submit" class="btn btn-primary btn-block">Enviar Instrucciones</button>
      </form>
      
      <div class="auth-footer">
        <p><a href="/paciente/login" data-link>¿Ya tienes cuenta? Inicia sesión</a></p>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const recoveryForm = document.getElementById('recovery-form');
  
  recoveryForm.addEventListener('submit', (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const emailError = document.getElementById('email-error');
    
    emailError.textContent = '';
    
    if (!email) {
      emailError.textContent = 'El correo es obligatorio';
      return;
    }
    
    if (!/^\S+@\S+\.\S+$/.test(email)) {
      emailError.textContent = 'Formato de correo inválido';
      return;
    }
    
    // En una implementación real, se enviarían instrucciones de recuperación
    showToast('Se han enviado instrucciones de recuperación a tu correo electrónico', 'success');
    
    // Redirigir al login después de un breve retraso
    setTimeout(() => {
      navigate('/paciente/login');
    }, 2000);
  });
});
</script>
