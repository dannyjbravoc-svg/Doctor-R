<div class="dashboard-container">
  <div class="container">
    <div class="dashboard-header">
      <a href="/doctor/pacientes" data-link class="back-button">← Regresar</a>
      <h1>Editar Paciente</h1>
      <p>Actualiza la información del paciente</p>
    </div>
    
    <div class="grid grid-2">
      <div>
        <div class="card">
          <h3>Información Personal</h3>
          
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" value="María González" required>
          </div>
          
          <div class="form-group">
            <label for="cedula">Cédula de Identidad</label>
            <input type="text" id="cedula" value="V23456789" required>
          </div>
          
          <div class="form-group">
            <label for="fecha-nacimiento">Fecha de Nacimiento</label>
            <input type="date" id="fecha-nacimiento" value="1988-05-12" required>
          </div>
          
          <div class="form-group">
            <label for="sexo">Sexo</label>
            <select id="sexo" required>
              <option value="F" selected>Femenino</option>
              <option value="M">Masculino</option>
              <option value="O">Otro</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="estado-civil">Estado Civil</label>
            <select id="estado-civil" required>
              <option value="casado" selected>Casado(a)</option>
              <option value="soltero">Soltero(a)</option>
              <option value="divorciado">Divorciado(a)</option>
              <option value="viudo">Viudo(a)</option>
              <option value="unión-libre">Unión Libre</option>
            </select>
          </div>
        </div>
      </div>
      
      <div>
        <div class="card">
          <h3>Información de Contacto</h3>
          
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" value="+58 414-5556677" required>
          </div>
          
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" value="maria@example.com" required>
          </div>
          
          <div class="form-group">
            <label for="direccion">Dirección</label>
            <textarea id="direccion" rows="3" required>Av. Principal, Edif. Médico, Piso 2, Consultorio 205, Caracas</textarea>
          </div>
          
          <div class="form-group">
            <label for="contacto-emergencia">Contacto de Emergencia</label>
            <input type="text" id="contacto-emergencia" value="Juan González" required>
          </div>
          
          <div class="form-group">
            <label for="relacion-emergencia">Relación</label>
            <input type="text" id="relacion-emergencia" value="Esposo" required>
          </div>
          
          <div class="form-group">
            <label for="telefono-emergencia">Teléfono de Emergencia</label>
            <input type="text" id="telefono-emergencia" value="+58 412-1234567" required>
          </div>
        </div>
      </div>
    </div>
    
    <div class="section" style="margin-top: var(--space-4);">
      <h2>Historial Médico</h2>
      
      <div class="card">
        <div class="form-group">
          <label for="condiciones-cronicas">Condiciones Crónicas</label>
          <div class="enfermedades-container">
            <!-- Enfermedades se cargarán dinámicamente -->
          </div>
        </div>
        
        <div class="form-group">
          <label for="alergias">Alergias Conocidas</label>
          <textarea id="alergias" rows="3">Ninguna conocida</textarea>
        </div>
        
        <div class="form-group">
          <label for="medicamentos">Medicamentos Actuales</label>
          <textarea id="medicamentos" rows="3">Enalapril 10mg diario</textarea>
        </div>
        
        <div class="form-group">
          <label for="cirugias">Cirugías Previas</label>
          <textarea id="cirugias" rows="3">Apendicectomía en 2010</textarea>
        </div>
        
        <div class="form-group">
          <label for="antecedentes">Antecedentes Familiares Relevantes</label>
          <textarea id="antecedentes" rows="3">Padre con infarto cardíaco a los 55 años</textarea>
        </div>
      </div>
    </div>
    
    <div class="section" style="margin-top: var(--space-4);">
      <h2>Evidencias Médicas</h2>
      
      <div class="evidencias-grid">
        <div class="evidencia-card">
          <div class="evidencia-image">
            <img src="assets/images/evidencia1.jpg" alt="Herida" style="width:100%; height:200px; object-fit:cover; border-radius: var(--radius-lg);">
          </div>
          <div class="evidencia-details">
            <h4>Herida</h4>
            <p>Control post-operatorio de herida</p>
            <small>15/05/2023</small>
            <div class="evidencia-actions">
              <button class="btn btn-icon">🔍</button>
              <button class="btn btn-icon">🗑️</button>
            </div>
          </div>
        </div>
        
        <div class="evidencia-card">
          <div class="evidencia-image">
            <img src="assets/images/evidencia2.jpg" alt="Radiografía" style="width:100%; height:200px; object-fit:cover; border-radius: var(--radius-lg);">
          </div>
          <div class="evidencia-details">
            <h4>Radiografía</h4>
            <p>Fractura en brazo izquierdo</p>
            <small>10/05/2023</small>
            <div class="evidencia-actions">
              <button class="btn btn-icon">🔍</button>
              <button class="btn btn-icon">🗑️</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div style="text-align: right; margin-top: var(--space-4);">
      <button type="button" class="btn btn-outline" id="cancelar-edicion">Cancelar</button>
      <button type="button" class="btn btn-primary" id="guardar-cambios">Guardar Cambios</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Configurar guardado
  document.getElementById('guardar-cambios').addEventListener('click', guardarCambios);
  document.getElementById('cancelar-edicion').addEventListener('click', () => navigate('/doctor/pacientes'));
  
  // Renderizar enfermedades
  renderEnfermedades();
  
  function guardarCambios() {
    // En una implementación real, se guardarían los cambios
    showToast('Cambios guardados exitosamente', 'success');
    
    // Redirigir a la lista de pacientes
    setTimeout(() => {
      navigate('/doctor/pacientes');
    }, 1000);
  }
  
  function renderEnfermedades() {
    const container = document.querySelector('.enfermedades-container');
    if (!container) return;
    
    const enfermedadesList = getEnfermedades();
    let html = '';
    
    enfermedadesList.forEach(enfermedad => {
      const isChecked = enfermedad.id === 'hipertension';
      html += `
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" name="enfermedades" value="${enfermedad.id}" ${isChecked ? 'checked' : ''}>
            <span class="checkmark"></span>
            ${enfermedad.nombre}
          </label>
        </div>
      `;
    });
    
    container.innerHTML = html;
  }
});
</script>
