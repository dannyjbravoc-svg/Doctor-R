<div class="auth-container">
  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Registro de Paciente</h1>
        <p>Crea tu cuenta para acceder a nuestros servicios médicos</p>
      </div>
      
      <div class="registration-steps">
        <!-- Paso 1: Datos Personales -->
        <div class="step active" data-step="1">
          <div class="step-header">
            <div class="step-number">1</div>
            <h2 class="step-title">Datos Personales</h2>
          </div>
          
          <form id="step1-form" class="auth-form">
            <div class="form-group">
              <label for="nombre">Nombre Completo</label>
              <input type="text" id="nombre" required>
              <div class="error-message" id="nombre-error"></div>
            </div>
            
            <div class="form-group">
              <label for="cedula">Cédula de Identidad</label>
              <input type="text" id="cedula" required>
              <div class="error-message" id="cedula-error"></div>
            </div>
            
            <div class="form-group">
              <label for="fecha-nacimiento">Fecha de Nacimiento</label>
              <input type="date" id="fecha-nacimiento" required>
              <div class="error-message" id="fecha-nacimiento-error"></div>
            </div>
            
            <div class="form-group">
              <label for="sexo">Sexo</label>
              <select id="sexo" required>
                <option value="">Selecciona una opción</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Otro</option>
              </select>
              <div class="error-message" id="sexo-error"></div>
            </div>
            
            <div class="form-group">
              <label for="estado-civil">Estado Civil</label>
              <select id="estado-civil" required>
                <option value="">Selecciona una opción</option>
                <option value="soltero">Soltero(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="viudo">Viudo(a)</option>
                <option value="unión-libre">Unión Libre</option>
              </select>
              <div class="error-message" id="estado-civil-error"></div>
            </div>
            
            <div class="step-actions">
              <div></div>
              <button type="button" class="btn btn-primary next-step" data-step="2">Siguiente</button>
            </div>
          </form>
        </div>
        
        <!-- Paso 2: Contacto -->
        <div class="step" data-step="2">
          <div class="step-header">
            <div class="step-number">2</div>
            <h2 class="step-title">Información de Contacto</h2>
          </div>
          
          <form id="step2-form" class="auth-form">
            <div class="form-group">
              <label for="telefono">Teléfono Móvil</label>
              <input type="text" id="telefono" required>
              <div class="error-message" id="telefono-error"></div>
            </div>
            
            <div class="form-group">
              <label for="email">Correo Electrónico</label>
              <input type="email" id="email" required>
              <div class="error-message" id="email-error"></div>
            </div>
            
            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" required>
                <option value="">Selecciona un estado</option>
                <option value="distrito-capital">Distrito Capital</option>
                <option value="amazonas">Amazonas</option>
                <option value="anzoategui">Anzoátegui</option>
                <!-- Más estados -->
              </select>
              <div class="error-message" id="estado-error"></div>
            </div>
            
            <div class="form-group">
              <label for="ciudad">Ciudad</label>
              <input type="text" id="ciudad" required>
              <div class="error-message" id="ciudad-error"></div>
            </div>
            
            <div class="form-group">
              <label for="zona">Zona/Barrio</label>
              <input type="text" id="zona" required>
              <div class="error-message" id="zona-error"></div>
            </div>
            
            <div class="form-group">
              <label for="calle">Calle/Avenida</label>
              <input type="text" id="calle" required>
              <div class="error-message" id="calle-error"></div>
            </div>
            
            <div class="form-group">
              <label for="contacto-emergencia">Nombre de Contacto de Emergencia</label>
              <input type="text" id="contacto-emergencia" required>
              <div class="error-message" id="contacto-emergencia-error"></div>
            </div>
            
            <div class="form-group">
              <label for="relacion-emergencia">Relación</label>
              <input type="text" id="relacion-emergencia" required>
              <div class="error-message" id="relacion-emergencia-error"></div>
            </div>
            
            <div class="form-group">
              <label for="telefono-emergencia">Teléfono de Emergencia</label>
              <input type="text" id="telefono-emergencia" required>
              <div class="error-message" id="telefono-emergencia-error"></div>
            </div>
            
            <div class="step-actions">
              <button type="button" class="btn btn-outline prev-step" data-step="1">Atrás</button>
              <button type="button" class="btn btn-primary next-step" data-step="3">Siguiente</button>
            </div>
          </form>
        </div>
        
        <!-- Paso 3: Historial Médico -->
        <div class="step" data-step="3">
          <div class="step-header">
            <div class="step-number">3</div>
            <h2 class="step-title">Historial Médico</h2>
          </div>
          
          <form id="step3-form" class="auth-form">
            <div class="form-group">
              <label>Condiciones Crónicas</label>
              <div class="enfermedades-container">
                <!-- Enfermedades se cargarán dinámicamente -->
              </div>
            </div>
            
            <div class="form-group">
              <label for="alergias">Alergias Conocidas</label>
              <textarea id="alergias" rows="3" placeholder="Ej: Alergia a penicilina, etc."></textarea>
              <div class="error-message" id="alergias-error"></div>
            </div>
            
            <div class="form-group">
              <label for="medicamentos">Medicamentos Actuales</label>
              <textarea id="medicamentos" rows="3" placeholder="Ej: Enalapril 10mg diario, etc."></textarea>
              <div class="error-message" id="medicamentos-error"></div>
            </div>
            
            <div class="form-group">
              <label for="cirugias">Cirugías Previas</label>
              <textarea id="cirugias" rows="3" placeholder="Ej: Apendicectomía en 2010, etc."></textarea>
              <div class="error-message" id="cirugias-error"></div>
            </div>
            
            <div class="form-group">
              <label for="antecedentes">Antecedentes Familiares Relevantes</label>
              <textarea id="antecedentes" rows="3"></textarea>
              <div class="error-message" id="antecedentes-error"></div>
            </div>
            
            <div class="step-actions">
              <button type="button" class="btn btn-outline prev-step" data-step="2">Atrás</button>
              <button type="button" class="btn btn-primary next-step" data-step="4">Siguiente</button>
            </div>
          </form>
        </div>
        
        <!-- Paso 4: Cuenta -->
        <div class="step" data-step="4">
          <div class="step-header">
            <div class="step-number">4</div>
            <h2 class="step-title">Crear Cuenta</h2>
          </div>
          
          <form id="step4-form" class="auth-form">
            <div class="form-group">
              <label for="password">Contraseña</label>
              <input type="password" id="password" required>
              <div class="error-message" id="password-error"></div>
            </div>
            
            <div class="form-group">
              <label for="confirm-password">Confirmar Contraseña</label>
              <input type="password" id="confirm-password" required>
              <div class="error-message" id="confirm-password-error"></div>
            </div>
            
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="terms" required>
                <span class="checkmark"></span>
                Acepto los <a href="/terminos" data-link>Términos y Condiciones</a>
              </label>
            </div>
            
            <div class="step-actions">
              <button type="button" class="btn btn-outline prev-step" data-step="3">Atrás</button>
              <button type="submit" class="btn btn-primary">Crear Cuenta</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    
    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a href="/paciente/login" data-link>Inicia sesión aquí</a></p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Configurar navegación entre pasos
  document.querySelectorAll('.next-step').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const step = parseInt(e.target.dataset.step);
      goToStep(step);
    });
  });
  
  document.querySelectorAll('.prev-step').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const step = parseInt(e.target.dataset.step);
      goToStep(step);
    });
  });
  
  // Configurar el formulario de registro
  document.getElementById('step4-form').addEventListener('submit', register);
  
  // Renderizar enfermedades en el paso 3
  renderEnfermedades();
  
  function goToStep(step) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.querySelector(`.step[data-step="${step}"]`).classList.add('active');
  }
  
  function register(e) {
    e.preventDefault();
    
    // Validar todos los pasos
    const isValidStep1 = validateStep(1);
    const isValidStep2 = validateStep(2);
    const isValidStep3 = validateStep(3);
    const isValidStep4 = validateStep(4);
    
    if (isValidStep1 && isValidStep2 && isValidStep3 && isValidStep4) {
      // En una implementación real, se registraría el paciente
      showToast('Cuenta creada exitosamente', 'success');
      
      // Redirigir al login después de un breve retraso
      setTimeout(() => {
        navigate('/paciente/login');
      }, 1000);
    } else {
      showToast('Por favor, completa todos los campos requeridos', 'error');
    }
  }
  
  function validateStep(step) {
    let isValid = true;
    const form = document.querySelector(`.step[data-step="${step}"] form`);
    const inputs = form.querySelectorAll('input, select, textarea');
    
    inputs.forEach(input => {
      if (input.required && !input.value) {
        isValid = false;
        const errorElement = document.getElementById(`${input.id}-error`);
        if (errorElement) {
          errorElement.textContent = 'Este campo es obligatorio';
          errorElement.classList.add('active');
        }
      } else {
        const errorElement = document.getElementById(`${input.id}-error`);
        if (errorElement) {
          errorElement.classList.remove('active');
        }
      }
    });
    
    return isValid;
  }
  
  function renderEnfermedades() {
    const container = document.querySelector('.enfermedades-container');
    if (!container) return;
    
    const enfermedadesList = getEnfermedades();
    let html = '';
    
    enfermedadesList.forEach(enfermedad => {
      html += `
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" name="enfermedades" value="${enfermedad.id}">
            <span class="checkmark"></span>
            ${enfermedad.nombre}
          </label>
        </div>
      `;
    });
    
    container.innerHTML = html;
  }
});
</script>
